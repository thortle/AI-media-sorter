version: '3.8'

services:
  photo-server:
    build: .
    container_name: photo-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Data files (embeddings, descriptions) - read-write for search logging
      - ../data:/app/data
      # Generated thumbnails - read-write for deletion
      - ./thumbnails:/app/thumbnails
      # Original photos on external SSD - read-write for trash
      - /Volumes/T7_SSD/G-photos:/photos
    environment:
      - PHOTO_BASE_PATH=/photos
      - THUMBNAIL_PATH=/app/thumbnails
      - DATA_PATH=/app/data
      # Authentication
      - AUTH_USERNAME=thortle
      - AUTH_PASSWORD=pozeleNOASTRE
